baseURL = 'https://robotamateur123.github.io/'
languageCode = 'en-us'
title = 'Robot Amateur'
theme = 'PaperMod'

# Keep Goldmark unsafe enabled for trusted embedded HTML
# and shortcodes that render iframes.
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[params]
  portfolioSections = ['play-with-arduino', 'DIY-robotic-arm']
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowToc = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 0

  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 1

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2
